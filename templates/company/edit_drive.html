{% extends "layout.html" %}

{% block content %}

<div class="row justify-content-center">
<div class="col-md-8">

<div class="card">
<div class="card-body">

<h4 class="mb-4">Edit Placement Drive</h4>

<form method="POST" action="{{ url_for('company.edit_drive', drive_id=drive.id) }}">

<div class="mb-3">
<label class="form-label">Job Title</label>
<input type="text"
       class="form-control"
       name="job_title"
       value="{{ drive.job_title }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Job Description</label>
<textarea class="form-control"
          name="job_description"
          rows="4"
          required>{{ drive.job_description }}</textarea>
</div>

<div class="mb-3">
<label class="form-label">Eligibility Criteria</label>
<textarea class="form-control"
          name="eligibility"
          rows="3"
          required>{{ drive.eligibility }}</textarea>
</div>

<div class="mb-3">
<label class="form-label">Application Deadline</label>
<input type="date"
       class="form-control"
       name="deadline"
       value="{{ drive.deadline.strftime('%Y-%m-%d') }}"
       required>
</div>

<div class="mb-4">
<label class="form-label">Drive Status</label>

<select class="form-select" name="status">
<option value="{{ drive.status }}" selected>
Current: {{ drive.status|capitalize }}
</option>

{% if drive.status != 'closed' %}

<option value="closed">Close Drive</option>
{% endif %}
</select>

</div>

<div class="d-flex justify-content-between">
<a href="{{ url_for('company.dashboard') }}"
   class="btn btn-outline-secondary">
Cancel
</a>

<button type="submit"
     class="btn btn-primary">
Update Drive </button>

</div>

</form>

</div>
</div>

</div>
</div>

{% endblock %}
