{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card p-4">
      <h3 class="mb-3">Register as Student</h3>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">CGPA</label>
          <input type="number" step="0.01" name="cgpa" class="form-control" placeholder="e.g., 8.5">
        </div>
        <div class="mb-3">
          <label class="form-label">Branch</label>
          <input type="text" name="branch" class="form-control" placeholder="e.g., Computer Science">
        </div>
        <div class="mb-3">
          <label class="form-label">Contact</label>
          <input type="text" name="contact" class="form-control" placeholder="Phone or Email">
        </div>
        <button type="submit" class="btn btn-primary w-100">Register</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
